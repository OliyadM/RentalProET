server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rentalpro-backend

  datasource:
    url: jdbc:postgresql://localhost:5433/rentalpro_db
    username: postgres
    password: Mikias@123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # CORRECT: Task execution settings go under spring, not management
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

jwt:
  secret: my-very-secret-key-that-is-at-least-32-characters-long-for-security
  expiration: 86400000

logging:
  level:
    com.rentalpro: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always