server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: rentalpro-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/rentalpro_db
    username: postgres
    password: Mikias@123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  # CORRECT: Task execution settings go under spring, not management
  task:
    execution:
      pool:
        core-size: 5
        max-size: 10

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# CORS Configuration
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

jwt:
  secret: my-very-secret-key-that-is-at-least-32-characters-long-for-security
  expiration: 86400000

# Cloudinary Configuration
cloudinary:
  enabled: ${CLOUDINARY_ENABLED:true}
  cloud-name: ${CLOUDINARY_CLOUD_NAME:dgfzid5yo}
  api-key: ${CLOUDINARY_API_KEY:664211454537591}
  api-secret: ${CLOUDINARY_API_SECRET:Fk_SLlXp3DNeuPuRkZkP4xaVdgU}

logging:
  level:
    com.rentalpro: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

# ── Database Seeder ───────────────────────────────────────────────────────────
# Default admin credentials for first-run initialization.
# Override via environment variables in staging/production:
#   ADMIN_SEED_EMAIL, ADMIN_SEED_PASSWORD, ADMIN_SEED_PHONE
app:
  seed:
    admin:
      email: ${ADMIN_SEED_EMAIL:admin@rentalpro.et}
      password: ${ADMIN_SEED_PASSWORD:Admin@123}
      phone: ${ADMIN_SEED_PHONE:+251900000000}