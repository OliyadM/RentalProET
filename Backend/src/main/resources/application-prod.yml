server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/rentalpro}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS}

cloudinary:
  enabled: ${CLOUDINARY_ENABLED:false}
  cloud-name: ${CLOUDINARY_CLOUD_NAME:}
  api-key: ${CLOUDINARY_API_KEY:}
  api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    com.rentalpro: INFO
    org.springframework.security: WARN

app:
  seed:
    admin:
      email: ${ADMIN_SEED_EMAIL:admin@rentalpro.et}
      password: ${ADMIN_SEED_PASSWORD:Admin@123}
      phone: ${ADMIN_SEED_PHONE:+251900000000}
