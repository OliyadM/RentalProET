# Render Blueprint — deploy backend + PostgreSQL for RentalPro ET demo
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: rentalpro-db
    databaseName: rentalpro
    user: rentalpro
    plan: free

services:
  - type: web
    name: rentalpro-backend
    env: docker
    plan: free
    dockerfilePath: ./Backend/Dockerfile
    dockerContext: ./Backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      # Set after frontend deploy, e.g. https://rentalpro.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      # Database credentials set manually in Render dashboard
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: rentalpro-db
      #     property: connectionString
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: CLOUDINARY_ENABLED
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_SEED_EMAIL
        value: admin@rentalpro.et
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_SEED_PHONE
        value: "+251900000000"
