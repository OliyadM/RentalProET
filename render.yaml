# Render Blueprint — deploy backend + PostgreSQL for RentalPro ET demo
# Docs: https://render.com/docs/blueprint-spec

databases:
  - name: rentalpro-db
    plan: free
    databaseName: rentalpro
    user: rentalpro

services:
  - type: web
    name: rentalpro-backend
    runtime: java
    plan: free
    rootDir: Backend
    buildCommand: chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: java -Dspring.profiles.active=prod -jar target/rentalpro-backend-1.0.0.jar
    healthCheckPath: /api/actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      # Set after frontend deploy, e.g. https://rentalpro.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rentalpro-db
          property: connectionString
      - key: CLOUDINARY_ENABLED
        value: "false"
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ADMIN_SEED_EMAIL
        value: admin@rentalpro.et
      - key: ADMIN_SEED_PASSWORD
        sync: false
      - key: ADMIN_SEED_PHONE
        value: "+251900000000"
