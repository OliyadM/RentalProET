services:
  # Backend Service
  - type: web
    name: rentalpro-backend
    runtime: java
    buildCommand: cd Backend && chmod +x mvnw && ./mvnw clean package -DskipTests
    startCommand: cd Backend && java -Dspring.profiles.active=prod -jar target/*.jar
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: rentalpro-db
          property: connectionString
    healthCheckPath: /api/actuator/health

  # PostgreSQL Database
  - type: pgsql
    name: rentalpro-db
    databaseName: rentalpro
    user: rentalpro
    plan: free
